// --- CDT time helpers ---
function getCDT() {
  const now = new Date();
  const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utcMs + (-5 * 3600000)); // CDT = UTC-5
}

function fmtTime(h, m) {
  const hh = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  const mm = String(m).padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  return `${hh}:${mm} ${ampm} CT`;
}

function getSessionState() {
  const cdt = getCDT();
  const y = cdt.getFullYear(), mo = String(cdt.getMonth()+1).padStart(2,'0'), d = String(cdt.getDate()).padStart(2,'0');
  const todayStr = `${y}-${mo}-${d}`;
  const nowMins = cdt.getHours() * 60 + cdt.getMinutes();
  const todaySessions = SESSIONS.filter(s => s.date === todayStr);
  if (!todaySessions.length) return null;
  for (const s of todaySessions) {
    const sm = s.start.h*60+s.start.m, em = s.end.h*60+s.end.m;
    if (nowMins >= sm && nowMins < em) return { type:'live', session:s };
  }
  for (const s of todaySessions) {
    const sm = s.start.h*60+s.start.m;
    if (nowMins < sm && sm - nowMins <= 30) return { type:'soon', session:s, mins: sm-nowMins };
  }
  for (const s of todaySessions) {
    const sm = s.start.h*60+s.start.m;
    if (nowMins < sm) return { type:'upcoming', session:s };
  }
  return null;
}

function getBannerState() {
  const cdt = getCDT();
  const y = cdt.getFullYear(), mo = String(cdt.getMonth()+1).padStart(2,'0'), d = String(cdt.getDate()).padStart(2,'0');
  const todayStr = `${y}-${mo}-${d}`;
  const todaySessions = SESSIONS.filter(s => s.date === todayStr);
  if (!todaySessions.length) return null;
  const nowMins = cdt.getHours()*60 + cdt.getMinutes();
  if (nowMins < 8*60) return null;
  for (const s of todaySessions) {
    const sm = s.start.h*60+s.start.m, em = s.end.h*60+s.end.m;
    if (nowMins >= sm && nowMins < em) return { type:'live', session:s };
  }
  for (const s of todaySessions) {
    const sm = s.start.h*60+s.start.m;
    if (nowMins < sm && sm - nowMins <= 30) return { type:'soon', session:s };
  }
  for (const s of todaySessions) {
    const sm = s.start.h*60+s.start.m;
    if (nowMins < sm) return { type:'countdown', session:s };
  }
  return { type:'wrap' };
}

function getTimeUntil(session) {
  const cdt = getCDT();
  const nowSecs = cdt.getHours()*3600 + cdt.getMinutes()*60 + cdt.getSeconds();
  const targetSecs = session.start.h*3600 + session.start.m*60;
  const remaining = targetSecs - nowSecs;
  if (remaining <= 0) return null;
  return { h: Math.floor(remaining/3600), m: Math.floor((remaining%3600)/60), s: remaining%60 };
}

function fmtCountdown(t) {
  if (!t) return '';
  const mm = String(t.m).padStart(2,'0'), ss = String(t.s).padStart(2,'0');
  return t.h > 0 ? `${t.h}h ${mm}m ${ss}s` : `${t.m}m ${ss}s`;
}

  return `<div style="background:${bg};padding:22px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px;">
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span style="color:${info.type==='live'?'rgba(255,255,255,0.85)':TEAL};font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;">Virtual Office Hours</span>
        ${info.type==='live' ? `<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.2);border-radius:20px;padding:4px 12px;"><span class="live-dot"></span><span style="color:#fff;font-size:11px;font-weight:800;letter-spacing:0.06em;">LIVE NOW</span></span>` : ''}
        ${info.type==='soon' ? `<span style="background:rgba(255,255,255,0.2);border-radius:20px;padding:4px 12px;color:#fff;font-size:11px;font-weight:700;">Starting soon</span>` : ''}
      </div>
      <h2 style="color:#fff;font-size:28px;font-weight:800;margin-bottom:8px;line-height:1.2;">${session.title}</h2>
      <p style="color:${subColor};font-size:13px;margin-bottom:${info.type!=='live'?'16px':'0'};">${timeRange} &nbsp;·&nbsp; Microsoft Teams &nbsp;·&nbsp; Passcode: <strong style="color:rgba(255,255,255,0.85);font-weight:700;">${session.passcode}</strong></p>
      ${info.type !== 'live' ? `<div style="display:flex;align-items:baseline;gap:10px;">
        <span id="countdown-display" style="color:#fff;font-size:36px;font-weight:800;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;">${fmtCountdown(t)}</span>

    <div style="text-align:center;flex-shrink:0;">

}

// --- State helpers ---
function loadLeads() {
  try { const s = localStorage.getItem("utak_sat2026_leads"); if (s) state.leads = JSON.parse(s); } catch(e) {}
}
function saveLeads() {
  try { localStorage.setItem("utak_sat2026_leads", JSON.stringify(state.leads)); } catch(e) {}
}
function setState(updates) { Object.assign(state, updates); render(); }

function setField(k, v) {
  state.form[k] = v;
  if (state.errors[k]) {
    delete state.errors[k];
    const errEl = document.getElementById('err-'+k);
    if (errEl) errEl.style.display = 'none';
    const inp = document.getElementById('field-'+k);
    if (inp) inp.style.border = '1.5px solid #D1D5DB';
  }
}

function toggleInterest(i) {
  const idx = state.form.interests.indexOf(i);
  const checked = idx < 0;
  if (idx >= 0) state.form.interests.splice(idx,1); else state.form.interests.push(i);
  const id = 'int-' + i.replace(/[^a-z0-9]/gi,'_');
  const el = document.getElementById(id);
  if (el) {
    el.style.border = '2px solid ' + (checked ? TEAL : '#E2E8F0');
    el.style.background = checked ? '#F0FBF9' : '#FAFAFA';
    const box = el.querySelector('.cb');
    if (box) { box.style.background = checked ? TEAL : '#fff'; box.style.borderColor = checked ? TEAL : '#CBD5E1'; box.innerHTML = checked ? '<span style="color:#fff;font-size:11px;font-weight:900;">✓</span>' : ''; }
    const sp = el.querySelector('span.label');
    if (sp) { sp.style.color = checked ? '#065F46' : '#374151'; sp.style.fontWeight = checked ? '700' : '400'; }
  }
}

function setFollowUp(val) {
  state.form.followUp = val;
  ['email','call','none'].forEach(v => {
    const el = document.getElementById('fu-'+v);
    if (!el) return;
    const active = v===val;
    el.style.border = '2px solid ' + (active ? NAVY : '#E2E8F0');
    el.style.background = active ? '#EEF2FF' : '#FAFAFA';
    const sp = el.querySelector('span');
    if (sp) { sp.style.fontWeight = active?'700':'500'; sp.style.color = active?NAVY:'#6B7280'; }
  });
}

function validate() {
  const e = {};
  if (!state.form.firstName.trim()) e.firstName = true;
  if (!state.form.lastName.trim()) e.lastName = true;
  if (!state.form.email.trim() || !state.form.email.includes('@') || !state.form.email.includes('.')) e.email = true;
  return e;
}

function submit() {
  const e = validate();
  if (Object.keys(e).length) { setState({ errors:e }); return; }
  const lead = { ...state.form, interests:[...state.form.interests], id:Date.now(), ts:new Date().toISOString(), assignee:"Unassigned" };
  state.leads.unshift(lead); saveLeads();
  setState({ success:true, form:{...BLANK,interests:[]}, errors:{} });
  setTimeout(() => setState({ success:false }), 3200);
}

function assign(id, assignee) {
  const lead = state.leads.find(l => l.id===id);
  if (lead) { lead.assignee = assignee; saveLeads(); render(); }
}
function deleteLead(id) {
  if (confirm("Remove this lead?")) { state.leads = state.leads.filter(l => l.id!==id); saveLeads(); render(); }
}
function openReview() { setState({ showPinModal:true, pinInput:"", pinError:false }); }
function submitPin() {
  if (state.pinInput===PIN) setState({ showPinModal:false, view:"review", pinInput:"", pinError:false });
  else setState({ pinError:true, pinInput:"" });
}
function closePin() { setState({ showPinModal:false, pinInput:"", pinError:false }); }

function exportCSV() {
  const h = ["First Name","Last Name","Email","Phone","Company","Job Title","Product Interests","Questions / Notes","Follow-Up Pref","Assignee","Submitted At"];
  const rows = state.leads.map(l => [l.firstName,l.lastName,l.email,l.phone,l.company,l.jobTitle,l.interests.join("; "),l.notes,l.followUp,l.assignee,new Date(l.ts).toLocaleString()]);
  const csv = [h,...rows].map(r => r.map(c => '"'+(c||"").replace(/"/g,'""')+'"').join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download = "SAT2026_UTAK_Leads.csv"; a.click();
}

}

        <div style="font-size:13px;color:#9CA3AF;margin-bottom:22px;">Enter PIN to view leads</div>
        <input id="pinField" type="password" inputmode="numeric" maxlength="10" value="${state.pinInput}"

          <button onclick="submitPin()" style="flex:1;padding:12px;border:none;border-radius:10px;background:${NAVY};font-size:14px;font-weight:700;color:#fff;cursor:pointer;">Unlock</button>

}

              <div id="err-email" style="color:#EF4444;font-size:11px;margin-top:3px;display:${e.email?'block':'none'};">Valid email required</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
            <div>
              <label style="${lbl}">Phone <span style="font-weight:400;opacity:0.5;text-transform:none;">(optional)</span></label>
              <input type="tel" style="${inp(false)}" value="${f.phone}" oninput="setField('phone',this.value)" placeholder="(555) 000-0000">
            </div>
            <div>
              <label style="${lbl}">Company <span style="font-weight:400;opacity:0.5;text-transform:none;">(optional)</span></label>
              <input style="${inp(false)}" value="${f.company}" oninput="setField('company',this.value)" placeholder="Acme Laboratories">
            </div>
            <div>
              <label style="${lbl}">Job Title <span style="font-weight:400;opacity:0.5;text-transform:none;">(optional)</span></label>
              <input style="${inp(false)}" value="${f.jobTitle}" oninput="setField('jobTitle',this.value)" placeholder="Lab Director, QA Manager...">
            </div>
          </div>
        </div>

        <!-- Product Interests -->
        <div style="background:#fff;border-radius:13px;padding:20px 22px;border:1px solid #E2E8F0;">
          <div style="font-size:11px;font-weight:800;color:${NAVY};text-transform:uppercase;letter-spacing:0.12em;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid ${TEAL};">Product Interests</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;">${interestBoxes}</div>
        </div>

        <!-- Notes + Follow-up + Save -->
        <div style="background:#fff;border-radius:13px;padding:20px 22px;border:1px solid #E2E8F0;">
          <div style="font-size:11px;font-weight:800;color:${NAVY};text-transform:uppercase;letter-spacing:0.12em;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid ${TEAL};">Questions / Notes</div>
          <textarea oninput="setField('notes',this.value)" placeholder="Questions, troubleshooting issues, special requests, or context for follow-up..." style="${inp(false)}min-height:80px;resize:vertical;line-height:1.6;">${f.notes}</textarea>
          <div style="margin-top:14px;">
            <label style="${lbl}margin-bottom:8px;">Preferred Follow-Up Method</label>
            <div style="display:flex;gap:10px;">${fuBtns}</div>
          </div>
        </div>

        <button onclick="submit()" style="width:100%;padding:16px;background:${NAVY};color:#fff;border:none;border-radius:11px;font-size:17px;font-weight:800;cursor:pointer;letter-spacing:0.02em;">
          Save Contact →
        </button>
      </div>

      <!-- RIGHT: QR Sidebar -->
      <div style="display:flex;flex-direction:column;gap:14px;">

        <!-- Office hours schedule — top of sidebar -->
        <div style="background:${NAVY};border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);">
          <div style="padding:14px 18px 10px;">
            <h3 style="font-size:13px;font-weight:800;color:${TEAL};text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;">Virtual Office Hours</h3>
            <p style="font-size:11px;color:rgba(255,255,255,0.45);font-weight:400;">Connect live with our team via Microsoft Teams</p>
          </div>
          <div style="padding:0 18px 14px;">
          ${SESSIONS.map((s,i) => {
            const info = getSessionState();
            const isLive = info && info.type==='live' && info.session===s;
            const cdt = getCDT();
            const nowMins = cdt.getHours()*60+cdt.getMinutes();
            const em = s.end.h*60+s.end.m;
            const isDone = nowMins >= em;
            return `<div style="padding:10px 0;${i < SESSIONS.length-1 ? 'border-bottom:1px solid rgba(255,255,255,0.08);':''};opacity:${isDone?'0.4':'1'}">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
                <div>
                  <div style="font-size:13px;font-weight:700;color:#fff;">${s.title}</div>
                  <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;">${s.date==='2026-04-08'?'Wed Apr 8':'Thu Apr 9'} &nbsp;·&nbsp; ${fmtTime(s.start.h,s.start.m)} – ${fmtTime(s.end.h,s.end.m)}</div>
                </div>
                ${isLive ? `<span style="background:${TEAL};color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:8px;flex-shrink:0;">LIVE</span>` : ''}
              </div>
            </div>`;
          }).join('')}
          </div>
        </div>

        <!-- Book a meeting -->
        <div style="background:${NAVY};border-radius:14px;padding:20px;text-align:center;">
          <div style="color:${TEAL};font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:6px;">Book a Meeting</div>
          <div style="color:#fff;font-size:15px;font-weight:700;margin-bottom:2px;">Andrew Hartmann</div>
          <div style="color:rgba(255,255,255,0.5);font-size:11px;margin-bottom:16px;">Schedule a 30-min discovery call</div>
          <div style="background:#fff;border-radius:10px;padding:10px;display:inline-block;">
            <img src="${QR_CALENDLY}" width="180" height="180" style="display:block;" onerror="this.parentElement.innerHTML='<div style=\'width:180px;height:180px;background:#f3f4f6;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#9CA3AF;text-align:center;padding:14px;\'>Wifi needed for QR code</div>'">
          </div>
          <div style="color:rgba(255,255,255,0.4);font-size:10px;margin-top:10px;">calendly.com/ahartmann-utak/30min</div>
        </div>

        <!-- Catalogue + Custom QC side by side -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div style="background:#fff;border-radius:13px;padding:16px;text-align:center;border:1px solid #E2E8F0;">
            <div style="color:${NAVY};font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;">Our Catalogue</div>
            <div style="background:#F8FAFC;border-radius:9px;padding:8px;display:inline-block;border:1px solid #E2E8F0;">
              <img src="${QR_CATALOGUE}" width="140" height="140" style="display:block;" onerror="this.parentElement.innerHTML='<div style=\'width:140px;height:140px;background:#f3f4f6;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#9CA3AF;\'>Need wifi</div>'">
            </div>
            <div style="color:#9CA3AF;font-size:10px;margin-top:8px;">utak.com/product-catalogue</div>
          </div>
          <div style="background:#fff;border-radius:13px;padding:16px;text-align:center;border:1px solid #E2E8F0;">
            <div style="color:${NAVY};font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;">Request Custom QC</div>
            <div style="background:#F8FAFC;border-radius:9px;padding:8px;display:inline-block;border:1px solid #E2E8F0;">
              <img src="${QR_CUSTOM}" width="140" height="140" style="display:block;" onerror="this.parentElement.innerHTML='<div style=\'width:140px;height:140px;background:#f3f4f6;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#9CA3AF;\'>Need wifi</div>'">
            </div>
            <div style="color:#9CA3AF;font-size:10px;margin-top:8px;">utak.com/personalized-qc</div>
          </div>
        </div>

      </div>
    </div>
  </div>`;
}

// --- Review view ---
function renderReview() {
  const leads = state.leads;
  const unassigned = leads.filter(l => l.assignee==="Unassigned").length;
  const filtered = state.filter==="All" ? leads : leads.filter(l => l.assignee===state.filter);

  const filterBtns = ["All",...TEAM].map(t => {
    const cnt = t==="All" ? leads.length : leads.filter(l => l.assignee===t).length;
    const active = state.filter===t;
    return `<button onclick="setState({filter:'${t.replace(/'/g,"\\'")}'})" style="padding:7px 14px;border-radius:7px;cursor:pointer;border:${active?"none":"1.5px solid #E2E8F0"};background:${active?NAVY:"#fff"};color:${active?"#fff":"#6B7280"};font-size:13px;font-weight:${active?"700":"500"};">${t} (${cnt})</button>`;
  }).join('');

  const leadCards = filtered.map(lead => {
    const tags = lead.interests.map(i => `<span style="background:#F0FBF9;color:#065F46;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:500;border:1px solid #D1FAE5;">${i}</span>`).join('');
    const badge = lead.followUp==="email"
      ? `<span style="background:#EFF6FF;color:#1D4ED8;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;">Email follow-up</span>`
      : lead.followUp==="call"
      ? `<span style="background:#ECFDF5;color:#065F46;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;">Call requested</span>`
      : `<span style="background:#F3F4F6;color:#9CA3AF;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;">No follow-up</span>`;
    const opts = TEAM.map(t => `<option value="${t}" ${lead.assignee===t?"selected":""}>${t}</option>`).join('');
    const meta = [lead.jobTitle,lead.company].filter(Boolean).join(' · ');
    const timeStr = new Date(lead.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    return `<div class="fade" style="background:#fff;border-radius:13px;padding:18px 22px;border:1px solid #E2E8F0;border-left:4px solid ${lead.assignee==="Unassigned"?"#F59E0B":TEAL};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
        <div><div style="font-size:17px;font-weight:700;color:${NAVY};">${lead.firstName} ${lead.lastName}</div>${meta?`<div style="font-size:12px;color:#6B7280;margin-top:2px;">${meta}</div>`:''}</div>
        <div style="display:flex;align-items:center;gap:9px;">
          <div style="font-size:11px;color:#9CA3AF;">${timeStr}</div>
          <select onchange="assign(${lead.id},this.value)" style="padding:6px 9px;border-radius:7px;border:1.5px solid #E2E8F0;font-size:12px;color:${NAVY};font-weight:600;cursor:pointer;background:${lead.assignee==="Unassigned"?"#FFFBEB":"#F0FBF9"};">${opts}</select>
          <button onclick="deleteLead(${lead.id})" style="background:none;border:1.5px solid #FCA5A5;border-radius:7px;color:#EF4444;padding:5px 9px;cursor:pointer;font-size:12px;">✕</button>
        </div>
      </div>
      <div style="display:flex;gap:12px;font-size:12px;color:#4B5563;margin-bottom:9px;flex-wrap:wrap;align-items:center;">
        ${lead.email?`<span>✉ ${lead.email}</span>`:''}${lead.phone?`<span>✆ ${lead.phone}</span>`:''}${badge}
      </div>
      ${lead.interests.length?`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;">${tags}</div>`:''}
      ${lead.notes?`<div style="background:#FFFBEB;border-radius:7px;padding:9px 12px;font-size:12px;color:#78350F;border-left:3px solid #F59E0B;font-style:italic;">"${lead.notes}"</div>`:''}
    </div>`;
  }).join('');

  return `<div class="fade">
    <div style="background:${NAVY};padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;">
      <div style="display:flex;align-items:center;gap:14px;">
        <button onclick="setState({view:'form'})" style="background:rgba(255,255,255,0.12);border:none;border-radius:8px;color:#fff;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;">← Back to Form</button>
        <div><div style="color:#fff;font-size:15px;font-weight:700;">SAT 2026 — Lead Review</div><div style="color:${TEAL};font-size:11px;margin-top:1px;">${leads.length} total · ${unassigned} unassigned</div></div>
      </div>
      <button onclick="exportCSV()" style="background:${TEAL};border:none;border-radius:8px;color:#fff;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">Export CSV ↓</button>
    </div>
    <div style="max-width:1440px;margin:0 auto;padding:20px 24px;">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;">
        ${[{label:"Total Leads",val:leads.length,color:NAVY},{label:"Unassigned",val:unassigned,color:"#D97706"},{label:"Email Follow-up",val:leads.filter(l=>l.followUp==="email").length,color:"#1D4ED8"},{label:"Call Requested",val:leads.filter(l=>l.followUp==="call").length,color:"#059669"}].map(({label,val,color})=>`<div style="background:#fff;border-radius:11px;padding:16px 18px;border:1px solid #E2E8F0;"><div style="font-size:10px;color:#9CA3AF;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;">${label}</div><div style="font-size:28px;font-weight:800;color:${color};line-height:1.1;margin-top:5px;">${val}</div></div>`).join('')}
      </div>
      <div style="display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;">${filterBtns}</div>
      ${filtered.length===0?`<div style="text-align:center;padding:60px;color:#9CA3AF;font-size:15px;">No leads match this filter.</div>`:`<div style="display:flex;flex-direction:column;gap:10px;">${leadCards}</div>`}
    </div>
  </div>`;
}

function render() {
  document.getElementById("root").innerHTML = `<div>${state.view==="form" ? renderForm() : renderReview()}${renderPinModal()}</div>`;
  const pf = document.getElementById("pinField");
  if (pf) setTimeout(() => pf.focus(), 50);
}

function updateBannerOnly() {
  const el = document.getElementById('main-banner');
  if (el) el.innerHTML = renderMainBanner();
}

function tickCountdown() {
  const el = document.getElementById('countdown-display');
  if (!el) return;
  const info = getBannerState();
  if (info && (info.type === 'countdown' || info.type === 'soon')) {
    const t = getTimeUntil(info.session);
    if (t) el.textContent = fmtCountdown(t);
  }
}

loadLeads();
render();
setInterval(updateBannerOnly, 60000);
setInterval(tickCountdown, 1000);
</script>
</body>
</html>
