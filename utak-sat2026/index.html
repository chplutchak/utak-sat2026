<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UTAK Booth — SAT 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: #F7F8FC; -webkit-text-size-adjust: 100%; }
input, textarea, select, button { font-family: inherit; -webkit-appearance: none; }
input[type=checkbox], input[type=radio] { -webkit-appearance: auto; appearance: auto; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
.fade { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.banner { animation: slideDown 0.3s ease; }
@keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>

<script>
const NAVY = "#0D1B3E";
const TEAL = "#00A99D";
const BORDER = "1px solid #E2E8F0";

const INTERESTS = [
  "Stock Products",
  "Custom QC",
  "Blank Matrices (Whole Blood, Serum, Urine)",
  "Specialty Matrices (Vitreous Humor, Meconium, CSF)",
  "Drugs of Abuse Controls (Whole Blood)",
  "Volatiles / Ethanol Controls",
  "Fentanyl / Opioid Controls",
  "Benzodiazepine Controls",
  "Metals & Trace Elements",
  "Antidepressants / SSRI Controls"
];

const TEAM = ["Unassigned","Andrew Hartmann","Aline Sotelo Arias","Ishawtae Logan","Morgan T. Wiza"];
const CALENDLY = "https://calendly.com/ahartmann-utak/30min";
const QR_SRC = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(CALENDLY) + "&bgcolor=ffffff&color=0d1b3e&margin=6";
const CATALOGUE_URL = "https://utak.com/product-catalogue/";
const QR_CATALOGUE = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(CATALOGUE_URL) + "&bgcolor=ffffff&color=0d1b3e&margin=6";
const CUSTOM_URL = "https://utak.com/personalized-qc/";
const QR_CUSTOM = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(CUSTOM_URL) + "&bgcolor=ffffff&color=0d1b3e&margin=6";

const BLANK = { firstName:"", lastName:"", email:"", phone:"", company:"", jobTitle:"", interests:[], notes:"", followUp:"email" };
const PIN = "2026";

let state = {
  view: "form",
  showPinModal: false,
  pinInput: "",
  pinError: false,
  form: { ...BLANK, interests: [] },
  leads: [],
  success: false,
  errors: {},
  filter: "All"
};

function loadLeads() {
  try {
    const saved = localStorage.getItem("utak_sat2026_leads");
    if (saved) state.leads = JSON.parse(saved);
  } catch(e) {}
}

function saveLeads() {
  try { localStorage.setItem("utak_sat2026_leads", JSON.stringify(state.leads)); } catch(e) {}
}

function setState(updates) {
  Object.assign(state, updates);
  render();
}

function setField(k, v) {
  state.form[k] = v;
  if (state.errors[k]) delete state.errors[k];
  render();
}

function toggleInterest(i) {
  const idx = state.form.interests.indexOf(i);
  if (idx >= 0) state.form.interests.splice(idx, 1);
  else state.form.interests.push(i);
  render();
}

function validate() {
  const e = {};
  if (!state.form.firstName.trim()) e.firstName = true;
  if (!state.form.lastName.trim()) e.lastName = true;
  if (!state.form.email.trim() || !state.form.email.includes("@") || !state.form.email.includes(".")) e.email = true;
  return e;
}

function submit() {
  const e = validate();
  if (Object.keys(e).length) { setState({ errors: e }); return; }
  const lead = { ...state.form, interests: [...state.form.interests], id: Date.now(), ts: new Date().toISOString(), assignee: "Unassigned" };
  state.leads.unshift(lead);
  saveLeads();
  setState({ success: true, form: { ...BLANK, interests: [] }, errors: {} });
  setTimeout(() => setState({ success: false }), 3200);
}

function assign(id, assignee) {
  const lead = state.leads.find(l => l.id === id);
  if (lead) { lead.assignee = assignee; saveLeads(); render(); }
}

function deleteLead(id) {
  if (confirm("Remove this lead?")) {
    state.leads = state.leads.filter(l => l.id !== id);
    saveLeads(); render();
  }
}

function openReview() {
  setState({ showPinModal: true, pinInput: "", pinError: false });
}

function submitPin() {
  if (state.pinInput === PIN) {
    setState({ showPinModal: false, view: "review", pinInput: "", pinError: false });
  } else {
    setState({ pinError: true, pinInput: "" });
  }
}

function closePin() {
  setState({ showPinModal: false, pinInput: "", pinError: false });
}

function renderPinModal() {
  if (!state.showPinModal) return "";
  return `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:100;">
      <div style="background:#fff;border-radius:18px;padding:32px 36px;width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
        <div style="font-size:28px;margin-bottom:10px;">🔒</div>
        <div style="font-size:18px;font-weight:800;color:${NAVY};margin-bottom:6px;">Staff Access Only</div>
        <div style="font-size:13px;color:#9CA3AF;margin-bottom:24px;">Enter PIN to view leads</div>
        <input
          id="pinField"
          type="password"
          inputmode="numeric"
          maxlength="10"
          value="${state.pinInput}"
          oninput="state.pinInput=this.value;if(state.pinError)setState({pinError:false});"
          onkeydown="if(event.key==='Enter')submitPin();"
          placeholder="Enter PIN"
          style="width:100%;padding:14px;font-size:22px;text-align:center;letter-spacing:0.3em;border:2px solid ${state.pinError?"#EF4444":"#E2E8F0"};border-radius:12px;outline:none;margin-bottom:8px;"
          autofocus
        >
        ${state.pinError ? `<div style="color:#EF4444;font-size:13px;margin-bottom:12px;">Incorrect PIN. Try again.</div>` : `<div style="margin-bottom:20px;"></div>`}
        <div style="display:flex;gap:10px;">
          <button onclick="closePin()" style="flex:1;padding:13px;border:1.5px solid #E2E8F0;border-radius:10px;background:#fff;font-size:15px;font-weight:600;color:#6B7280;cursor:pointer;">Cancel</button>
          <button onclick="submitPin()" style="flex:1;padding:13px;border:none;border-radius:10px;background:${NAVY};font-size:15px;font-weight:700;color:#fff;cursor:pointer;">Unlock</button>
        </div>
      </div>
    </div>`;
}

function exportCSV() {
  const h = ["First Name","Last Name","Email","Phone","Company","Job Title","Product Interests","Questions / Notes","Follow-Up Pref","Assignee","Submitted At"];
  const rows = state.leads.map(l => [l.firstName,l.lastName,l.email,l.phone,l.company,l.jobTitle,l.interests.join("; "),l.notes,l.followUp,l.assignee,new Date(l.ts).toLocaleString()]);
  const csv = [h,...rows].map(r => r.map(c => '"' + (c||"").replace(/"/g,'""') + '"').join(",")).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv"}));
  a.download = "SAT2026_UTAK_Leads.csv";
  a.click();
}

function topInterest() {
  const counts = {};
  state.leads.forEach(l => l.interests.forEach(i => { counts[i] = (counts[i]||0)+1; }));
  const top = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];
  return top ? top[0] : null;
}

function inp(err) {
  return `width:100%;padding:13px 14px;font-size:16px;border:${err?"2px solid #EF4444":"1.5px solid #D1D5DB"};border-radius:10px;outline:none;background:#fff;color:#1A1A2E;`;
}

const lbl = `font-size:12px;font-weight:700;color:#64748B;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:6px;display:block;`;

function renderForm() {
  const f = state.form;
  const e = state.errors;
  const leads = state.leads;

  const interestCheckboxes = INTERESTS.map(i => {
    const checked = f.interests.includes(i);
    return `
      <label onclick="toggleInterest('${i.replace(/'/g,"\\'")}'); return false;" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px 14px;border-radius:10px;border:2px solid ${checked?TEAL:"#E2E8F0"};background:${checked?"#F0FBF9":"#FAFAFA"};">
        <input type="checkbox" ${checked?"checked":""} onchange="toggleInterest('${i.replace(/'/g,"\\'")}');" style="width:18px;height:18px;flex-shrink:0;">
        <span style="font-size:14px;color:${checked?"#065F46":"#374151"};font-weight:${checked?"700":"400"};line-height:1.3;">${i}</span>
      </label>`;
  }).join("");

  const followUpBtns = [["email","✉  Email"],["call","✆  Phone Call"],["none","✗  No Follow-Up"]].map(([val, label]) => {
    const active = f.followUp === val;
    return `
      <label style="display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;padding:13px 10px;border-radius:10px;border:2px solid ${active?NAVY:"#E2E8F0"};background:${active?"#EEF2FF":"#FAFAFA"};flex:1;">
        <input type="radio" name="followUp" value="${val}" ${active?"checked":""} onchange="setField('followUp','${val}');">
        <span style="font-size:14px;font-weight:${active?"700":"500"};color:${active?NAVY:"#6B7280"};">${label}</span>
      </label>`;
  }).join("");


  return `
  <div class="fade">
    <div style="background:${NAVY};padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;">
      <div>
        <div style="color:#fff;font-size:20px;font-weight:800;letter-spacing:-0.02em;">UTAK Laboratories</div>
        <div style="color:${TEAL};font-size:12px;font-weight:600;letter-spacing:0.1em;margin-top:1px;">SAT 2026 — BOOTH LEAD INTAKE</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <button onclick="openReview()" style="background:${TEAL};border:none;border-radius:8px;color:#fff;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;">View Leads →</button>
      </div>
    </div>

    ${state.success ? `<div class="banner" style="background:#D1FAE5;border-bottom:2px solid #34D399;padding:14px 24px;text-align:center;font-size:16px;font-weight:700;color:#065F46;">✓ Contact saved! Form cleared and ready for the next visitor.</div>` : ""}

    <div style="display:grid;grid-template-columns:1fr 310px;gap:24px;max-width:1100px;margin:0 auto;padding:24px;">
      <div>
        <div style="background:#fff;border-radius:14px;padding:22px 24px;margin-bottom:16px;${BORDER.replace("1px","border:1px")}">
          <div style="font-size:11px;font-weight:800;color:${NAVY};text-transform:uppercase;letter-spacing:0.12em;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid ${TEAL};">Contact Information</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
            <div>
              <label style="${lbl}">First Name *</label>
              <input style="${inp(e.firstName)}" value="${f.firstName}" oninput="setField('firstName',this.value)" placeholder="Jane">
              ${e.firstName ? '<div style="color:#EF4444;font-size:12px;margin-top:4px;">Required</div>' : ""}
            </div>
            <div>
              <label style="${lbl}">Last Name *</label>
              <input style="${inp(e.lastName)}" value="${f.lastName}" oninput="setField('lastName',this.value)" placeholder="Smith">
              ${e.lastName ? '<div style="color:#EF4444;font-size:12px;margin-top:4px;">Required</div>' : ""}
            </div>
          </div>
          <div style="margin-bottom:14px;">
            <label style="${lbl}">Email Address *</label>
            <input type="email" style="${inp(e.email)}" value="${f.email}" oninput="setField('email',this.value)" placeholder="jane@lab.com">
            ${e.email ? '<div style="color:#EF4444;font-size:12px;margin-top:4px;">Please enter a valid email</div>' : ""}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
            <div>
              <label style="${lbl}">Phone <span style="font-weight:400;opacity:0.6;text-transform:none;">(optional)</span></label>
              <input type="tel" style="${inp(false)}" value="${f.phone}" oninput="setField('phone',this.value)" placeholder="(555) 000-0000">
            </div>
            <div>
              <label style="${lbl}">Company <span style="font-weight:400;opacity:0.6;text-transform:none;">(optional)</span></label>
              <input style="${inp(false)}" value="${f.company}" oninput="setField('company',this.value)" placeholder="Acme Laboratories">
            </div>
          </div>
          <div>
            <label style="${lbl}">Job Title <span style="font-weight:400;opacity:0.6;text-transform:none;">(optional)</span></label>
            <input style="${inp(false)}" value="${f.jobTitle}" oninput="setField('jobTitle',this.value)" placeholder="Lab Director, QA Manager...">
          </div>
        </div>

        <div style="background:#fff;border-radius:14px;padding:22px 24px;margin-bottom:16px;border:1px solid #E2E8F0;">
          <div style="font-size:11px;font-weight:800;color:${NAVY};text-transform:uppercase;letter-spacing:0.12em;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid ${TEAL};">Product Interests</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">${interestCheckboxes}</div>
        </div>

        <div style="background:#fff;border-radius:14px;padding:22px 24px;margin-bottom:16px;border:1px solid #E2E8F0;">
          <div style="font-size:11px;font-weight:800;color:${NAVY};text-transform:uppercase;letter-spacing:0.12em;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid ${TEAL};">Questions / Notes</div>
          <textarea oninput="setField('notes',this.value)" placeholder="Capture any questions, troubleshooting issues, special requests, or context for follow-up..." style="${inp(false)}min-height:96px;resize:vertical;line-height:1.6;">${f.notes}</textarea>
          <div style="margin-top:18px;">
            <label style="${lbl}margin-bottom:10px;">Preferred Follow-Up Method</label>
            <div style="display:flex;gap:10px;">${followUpBtns}</div>
          </div>
        </div>

        <button onclick="submit()" style="width:100%;padding:18px;background:${NAVY};color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:800;cursor:pointer;letter-spacing:0.02em;">
          Save Contact →
        </button>
      </div>

      <div>
        <div style="background:${NAVY};border-radius:16px;padding:24px;text-align:center;margin-bottom:16px;">
          <div style="color:${TEAL};font-size:11px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px;">Book a Meeting</div>
          <div style="color:#fff;font-size:16px;font-weight:700;margin-bottom:3px;">Andrew Hartmann</div>
          <div style="color:rgba(255,255,255,0.55);font-size:12px;margin-bottom:20px;">UTAK Sales Representative</div>
          <div style="background:#fff;border-radius:12px;padding:14px;display:inline-block;">
            <img src="${QR_SRC}" alt="Scan to schedule" style="width:170px;height:170px;display:block;" onerror="this.parentElement.innerHTML='<div style=\'width:170px;height:170px;background:#f3f4f6;border-radius:8px;display:flex;align-items:center;justify-content:center;text-align:center;padding:16px;font-size:12px;color:#9CA3AF;\'>Connect to wifi to load QR code</div>'">
          </div>
          <div style="color:rgba(255,255,255,0.45);font-size:11px;margin-top:14px;line-height:1.7;">Scan to schedule a<br>30-minute discovery call</div>
          <div style="margin-top:10px;color:${TEAL};font-size:11px;opacity:0.7;word-break:break-all;">calendly.com/ahartmann-utak/30min</div>
        </div>

        <div style="background:#fff;border-radius:16px;padding:20px;text-align:center;margin-bottom:16px;border:1px solid #E2E8F0;">
          <div style="color:${NAVY};font-size:11px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:16px;">Browse Our Catalogue</div>
          <div style="background:#F8FAFC;border-radius:12px;padding:12px;display:inline-block;border:1px solid #E2E8F0;">
            <img src="${QR_CATALOGUE}" alt="Product catalogue" style="width:140px;height:140px;display:block;" onerror="this.parentElement.innerHTML='<div style=\'width:140px;height:140px;background:#f3f4f6;border-radius:8px;display:flex;align-items:center;justify-content:center;text-align:center;padding:16px;font-size:12px;color:#9CA3AF;\'>Connect to wifi to load QR code</div>'">
          </div>
          <div style="color:#9CA3AF;font-size:11px;margin-top:12px;opacity:0.8;">utak.com/product-catalogue</div>
        </div>

        <div style="background:#fff;border-radius:16px;padding:20px;text-align:center;border:1px solid #E2E8F0;">
          <div style="color:${NAVY};font-size:11px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:16px;">Request Custom QC</div>
          <div style="background:#F8FAFC;border-radius:12px;padding:12px;display:inline-block;border:1px solid #E2E8F0;">
            <img src="${QR_CUSTOM}" alt="Custom QC form" style="width:140px;height:140px;display:block;" onerror="this.parentElement.innerHTML='<div style=\'width:140px;height:140px;background:#f3f4f6;border-radius:8px;display:flex;align-items:center;justify-content:center;text-align:center;padding:16px;font-size:12px;color:#9CA3AF;\'>Connect to wifi to load QR code</div>'">
          </div>
          <div style="color:#9CA3AF;font-size:11px;margin-top:12px;opacity:0.8;">utak.com/personalized-qc</div>
        </div>

      </div>
    </div>
  </div>`;
}

function renderReview() {
  const leads = state.leads;
  const unassigned = leads.filter(l => l.assignee === "Unassigned").length;
  const filtered = state.filter === "All" ? leads : leads.filter(l => l.assignee === state.filter);

  const filterBtns = ["All",...TEAM].map(t => {
    const cnt = t === "All" ? leads.length : leads.filter(l => l.assignee === t).length;
    const active = state.filter === t;
    return `<button onclick="setState({filter:'${t.replace(/'/g,"\\'")}'})" style="padding:8px 16px;border-radius:8px;cursor:pointer;border:${active?"none":"1.5px solid #E2E8F0"};background:${active?NAVY:"#fff"};color:${active?"#fff":"#6B7280"};font-size:13px;font-weight:${active?"700":"500"};">${t} (${cnt})</button>`;
  }).join("");

  const leadCards = filtered.map(lead => {
    const interestTags = lead.interests.map(i => `<span style="background:#F0FBF9;color:#065F46;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;border:1px solid #D1FAE5;">${i}</span>`).join("");
    const followUpBadge = lead.followUp==="email"
      ? `<span style="background:#EFF6FF;color:#1D4ED8;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:600;">Email follow-up</span>`
      : lead.followUp==="call"
      ? `<span style="background:#ECFDF5;color:#065F46;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:600;">Call requested</span>`
      : `<span style="background:#F3F4F6;color:#9CA3AF;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:600;">No follow-up</span>`;

    const assigneeOpts = TEAM.map(t => `<option value="${t}" ${lead.assignee===t?"selected":""}>${t}</option>`).join("");
    const timeStr = new Date(lead.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    const meta = [lead.jobTitle, lead.company].filter(Boolean).join(" · ");

    return `
      <div class="fade" style="background:#fff;border-radius:14px;padding:20px 24px;border:1px solid #E2E8F0;border-left:4px solid ${lead.assignee==="Unassigned"?"#F59E0B":TEAL};">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:10px;">
          <div>
            <div style="font-size:18px;font-weight:700;color:${NAVY};">${lead.firstName} ${lead.lastName}</div>
            ${meta ? `<div style="font-size:13px;color:#6B7280;margin-top:3px;">${meta}</div>` : ""}
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="font-size:11px;color:#9CA3AF;">${timeStr}</div>
            <select onchange="assign(${lead.id},this.value)" style="padding:7px 10px;border-radius:8px;border:1.5px solid #E2E8F0;font-size:13px;color:${NAVY};font-weight:600;cursor:pointer;background:${lead.assignee==="Unassigned"?"#FFFBEB":"#F0FBF9"};">${assigneeOpts}</select>
            <button onclick="deleteLead(${lead.id})" style="background:none;border:1.5px solid #FCA5A5;border-radius:8px;color:#EF4444;padding:6px 10px;cursor:pointer;font-size:13px;">✕</button>
          </div>
        </div>
        <div style="display:flex;gap:14px;font-size:13px;color:#4B5563;margin-bottom:10px;flex-wrap:wrap;align-items:center;">
          ${lead.email ? `<span>✉ ${lead.email}</span>` : ""}
          ${lead.phone ? `<span>✆ ${lead.phone}</span>` : ""}
          ${followUpBadge}
        </div>
        ${lead.interests.length > 0 ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">${interestTags}</div>` : ""}
        ${lead.notes ? `<div style="background:#FFFBEB;border-radius:8px;padding:10px 14px;font-size:13px;color:#78350F;border-left:3px solid #F59E0B;font-style:italic;">"${lead.notes}"</div>` : ""}
      </div>`;
  }).join("");

  return `
  <div class="fade">
    <div style="background:${NAVY};padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;">
      <div style="display:flex;align-items:center;gap:14px;">
        <button onclick="setState({view:'form'})" style="background:rgba(255,255,255,0.12);border:none;border-radius:8px;color:#fff;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;">← Back to Form</button>
        <div>
          <div style="color:#fff;font-size:16px;font-weight:700;">SAT 2026 — Lead Review</div>
          <div style="color:${TEAL};font-size:12px;margin-top:1px;">${leads.length} total · ${unassigned} unassigned</div>
        </div>
      </div>
      <button onclick="exportCSV()" style="background:${TEAL};border:none;border-radius:8px;color:#fff;padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;">Export CSV ↓</button>
    </div>

    <div style="max-width:1100px;margin:0 auto;padding:24px;">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;">
        ${[
          {label:"Total Leads",val:leads.length,color:NAVY},
          {label:"Unassigned",val:unassigned,color:"#D97706"},
          {label:"Email Follow-up",val:leads.filter(l=>l.followUp==="email").length,color:"#1D4ED8"},
          {label:"Call Requested",val:leads.filter(l=>l.followUp==="call").length,color:"#059669"}
        ].map(({label,val,color}) => `
          <div style="background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #E2E8F0;">
            <div style="font-size:11px;color:#9CA3AF;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;">${label}</div>
            <div style="font-size:30px;font-weight:800;color:${color};line-height:1.1;margin-top:6px;">${val}</div>
          </div>`).join("")}
      </div>

      <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;">${filterBtns}</div>

      ${filtered.length === 0
        ? `<div style="text-align:center;padding:60px;color:#9CA3AF;font-size:16px;">No leads match this filter.</div>`
        : `<div style="display:flex;flex-direction:column;gap:12px;">${leadCards}</div>`
      }
    </div>
  </div>`;
}

function render() {
  document.getElementById("root").innerHTML = `<div>${state.view === "form" ? renderForm() : renderReview()}${renderPinModal()}</div>`;
  const pf = document.getElementById("pinField");
  if (pf) setTimeout(() => pf.focus(), 50);
}

loadLeads();
render();
</script>
</body>
</html>
